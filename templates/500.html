<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | CareerAI</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">

        <header class="header">
            <div class="logo">
                <i class="fas fa-rocket"></i>
                <span>CareerAI</span>
            </div>
        </header>

        <div class="error-page animate-fade-in">

            <div class="error-number">500</div>

            <div class="error-icon">
                <i class="fas fa-triangle-exclamation"></i>
            </div>

            <h1 class="error-title">Something Went Wrong!</h1>

            <p class="error-description">
                Our AI got confused for a moment!
                Don't worry — this happens sometimes.
                Please try again and it should work perfectly.
            </p>

            <div class="error-actions">
                <a href="/" class="action-btn primary">
                    <i class="fas fa-rotate-right"></i>
                    Try Again
                </a>
                <a href="/" class="action-btn secondary">
                    <i class="fas fa-home"></i>
                    Go Home
                </a>
            </div>

        </div>

        <footer class="footer">
            <p>Built with
                <i class="fas fa-heart" style="color:#e74c3c"></i>
                using Flask & Gemini AI
            </p>
        </footer>

    </div>

</body>
</html>
